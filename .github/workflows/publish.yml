name: Prepare and push release
on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: "Release version to cut (for example 0.5.7)."
        required: true
        default: "X.Y.Z"
      developmentVersion:
        description: "Next development version (for example 0.5.8-SNAPSHOT)."
        required: true
        default: "X.Y.Z-SNAPSHOT"

permissions:
  contents: read

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Configure Git User
      run: |
        git config user.email "actions@github.com"
        git config user.name "GitHub Actions"

    - name: Validate release inputs
      run: |
        set -euo pipefail
        RELEASE_VERSION='${{ github.event.inputs.releaseVersion }}'
        DEVELOPMENT_VERSION='${{ github.event.inputs.developmentVersion }}'
        SEMVER_RE='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'
        SNAPSHOT_RE='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?-SNAPSHOT$'

        [[ "$RELEASE_VERSION" =~ $SEMVER_RE ]] || {
          echo "Invalid releaseVersion: $RELEASE_VERSION"
          exit 1
        }
        [[ "$DEVELOPMENT_VERSION" =~ $SNAPSHOT_RE ]] || {
          echo "Invalid developmentVersion: $DEVELOPMENT_VERSION"
          exit 1
        }

    - name: Prepare release commits and tag
      run: |
        set -euo pipefail
        RELEASE_VERSION='${{ github.event.inputs.releaseVersion }}'
        DEVELOPMENT_VERSION='${{ github.event.inputs.developmentVersion }}'

        sed -i "s/^version=.*/version=$RELEASE_VERSION/" gradle.properties
        git add gradle.properties
        git commit -m "chore(release): prepare $RELEASE_VERSION"
        git tag "v$RELEASE_VERSION"

        sed -i "s/^version=.*/version=$DEVELOPMENT_VERSION/" gradle.properties
        git add gradle.properties
        git commit -m "chore: bump version to $DEVELOPMENT_VERSION"

    - name: Push release commit and tag
      run: |
        git push --follow-tags origin HEAD:${{ github.ref_name }}
