name: Prepare and push release
on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: "Release version to cut (for example 0.5.7)."
        required: true
        default: "X.Y.Z"
      developmentVersion:
        description: "Next development version (for example 0.5.8-SNAPSHOT)."
        required: true
        default: "X.Y.Z-SNAPSHOT"

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Configure Git User
      run: |
        git config user.email "actions@github.com"
        git config user.name "GitHub Actions"

    - name: Prepare release commits and tag
      run: |
        RELEASE_VERSION="${{ github.event.inputs.releaseVersion }}"
        DEVELOPMENT_VERSION="${{ github.event.inputs.developmentVersion }}"

        sed -i "s/^version=.*/version=$RELEASE_VERSION/" gradle.properties
        git add gradle.properties
        git commit -m "chore(release): prepare $RELEASE_VERSION"
        git tag "v$RELEASE_VERSION"

        sed -i "s/^version=.*/version=$DEVELOPMENT_VERSION/" gradle.properties
        git add gradle.properties
        git commit -m "chore: bump version to $DEVELOPMENT_VERSION"

    - name: Push release commit and tag
      run: |
        git push --follow-tags origin HEAD:${{ github.ref_name }}
